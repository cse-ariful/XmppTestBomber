<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XMPP Connection Utility</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">XMPP Connection Utility</h1>

      <div class="card mb-4">
        <div class="card-header">Server Configuration</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <input
                type="text"
                id="serverAddress"
                class="form-control"
                value="192.168.0.117"
                placeholder="XMPP Server Address"
              />
            </div>
            <div class="col-md-3">
              <input
                type="number"
                id="serverPort"
                class="form-control"
                value="5280"
                placeholder="Port"
              />
            </div>
            <div class="col-md-3">
              <select id="connectionType" class="form-select">
                <option value="bosh">BOSH</option>
                <option value="websocket">WebSocket</option>
              </select>
            </div>
            <div class="col-md-2">
              <button id="connectBtn" class="btn btn-primary w-100">
                Connect
              </button>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="disableTLS"
                />
                <label class="form-check-label" for="disableTLS">
                  Disable TLS
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-header">Credentials</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <input
                type="text"
                id="usernameInput"
                class="form-control"
                placeholder="Username"
              />
            </div>
            <div class="col-md-4">
              <input
                type="password"
                id="passwordInput"
                class="form-control"
                placeholder="Password"
              />
            </div>
            <div class="col-md-4">
              <button id="addCredentialsBtn" class="btn btn-success w-100">
                Add Credentials
              </button>
            </div>
          </div>
          <table class="table table-striped mt-3" id="credentialsTable">
            <thead>
              <tr>
                <th>Username</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="credentialsList"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Activity Logs</div>
        <div class="card-body">
          <div
            id="activityLogs"
            class="overflow-auto"
            style="max-height: 300px"
          ></div>
        </div>
      </div>
    </div>

    <!-- Strophe Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/strophe.js/1.5.0/strophe.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const serverAddressInput = document.getElementById("serverAddress");
        const serverPortInput = document.getElementById("serverPort");
        const connectionTypeSelect = document.getElementById("connectionType");
        const disableTLSCheckbox = document.getElementById("disableTLS");
        const connectBtn = document.getElementById("connectBtn");
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const addCredentialsBtn = document.getElementById("addCredentialsBtn");
        const credentialsList = document.getElementById("credentialsList");
        const activityLogs = document.getElementById("activityLogs");

        const BACKEND_URL = window.location.origin;
        const WEBSOCKET_URL = `${
          window.location.protocol === "https:" ? "wss:" : "ws:"
        }//${window.location.host}/ws/xmpp-connection`;

        let credentials = [];
        let websocket = null;

        function log(message, type = "info") {
          const logEntry = document.createElement("div");
          logEntry.classList.add(`text-${type}`, "mb-2");
          logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
          activityLogs.prepend(logEntry);
        }

        async function fetchCredentials() {
          try {
            const response = await fetch(`${BACKEND_URL}/credentials`);
            credentials = await response.json();
            renderCredentials();
          } catch (error) {
            log(`Failed to fetch credentials: ${error}`, "danger");
          }
        }

        function renderCredentials() {
          credentialsList.innerHTML = "";
          credentials.forEach((cred, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${cred.username}</td>
                <td>
                    <button class="btn btn-sm btn-danger remove-cred" data-username="${cred.username}">Remove</button>
                </td>
            `;
            credentialsList.appendChild(row);
          });

          document.querySelectorAll(".remove-cred").forEach((btn) => {
            btn.addEventListener("click", async (e) => {
              const username = e.target.getAttribute("data-username");
              try {
                const response = await fetch(
                  `${BACKEND_URL}/credentials/${username}`,
                  {
                    method: "DELETE",
                  }
                );
                if (response.ok) {
                  await fetchCredentials();
                  log(`Removed credential for ${username}`, "warning");
                }
              } catch (error) {
                log(`Failed to remove credential: ${error}`, "danger");
              }
            });
          });
        }

        addCredentialsBtn.addEventListener("click", async () => {
          const username = usernameInput.value;
          const password = passwordInput.value;

          if (username && password) {
            try {
              const response = await fetch(`${BACKEND_URL}/credentials`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ username, password }),
              });

              if (response.ok) {
                await fetchCredentials();
                usernameInput.value = "";
                passwordInput.value = "";
                log(`Added credential for ${username}`, "success");
              } else {
                const errorData = await response.json();
                log(`Failed to add credential: ${errorData.detail}`, "danger");
              }
            } catch (error) {
              log(`Failed to add credential: ${error}`, "danger");
            }
          }
        });

        function connectXMPP() {
          if (credentials.length === 0) {
            log("No credentials available", "warning");
            return;
          }

          const randomCred =
            credentials[Math.floor(Math.random() * credentials.length)];
          const serverAddress = serverAddressInput.value;
          const serverPort = serverPortInput.value;
          const connectionType = connectionTypeSelect.value;
          const disableTLS = disableTLSCheckbox.checked;

          // Close existing WebSocket if open
          if (websocket && websocket.readyState !== WebSocket.CLOSED) {
            websocket.close();
          }

          // Establish WebSocket connection
          websocket = new WebSocket(WEBSOCKET_URL);

          websocket.onopen = () => {
            log("WebSocket connection established", "success");

            // Send connection request
            websocket.send(
              JSON.stringify({
                server: serverAddress,
                port: serverPort,
                connectionType: connectionType,
                username: randomCred.username,
                password: randomCred.password,
                disableTLS: disableTLS,
              })
            );
          };

          websocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.status) {
              case "connecting":
                log("Attempting XMPP connection...", "info");
                break;
              case "connected":
                log(`Connected to ${data.details.server}`, "success");
                break;
              case "message_sent":
                log(`Message sent to ${data.to}`, "success");
                break;
              case "auth_failed":
                log("Authentication failed", "danger");
                break;
              case "error":
                log(`Connection error: ${data.message}`, "danger");
                break;
            }
          };

          websocket.onerror = (error) => {
            log(`WebSocket error: ${error}`, "danger");
          };

          websocket.onclose = () => {
            log("WebSocket connection closed", "warning");
          };
        }

        // Initial credentials fetch
        fetchCredentials();
        connectBtn.addEventListener("click", connectXMPP);
      });
    </script>
  </body>
</html>
